<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1e3a5f"/>
  <!-- Mountain back -->
  <polygon points="4,52 24,22 44,52" fill="#4a7c59" opacity="0.6"/>
  <!-- Mountain front -->
  <polygon points="18,52 40,18 62,52" fill="#5b8f5e"/>
  <!-- Snow cap -->
  <polygon points="34,24 40,18 46,24 43,24 40,20.5 37,24" fill="#fff"/>
  <!-- Hut body -->
  <rect x="24" y="40" width="12" height="9" rx="1" fill="#d4915a"/>
  <!-- Hut roof -->
  <polygon points="22,40 30,33 38,40" fill="#8b4513"/>
  <!-- Door -->
  <rect x="28" y="43" width="4" height="6" rx="0.5" fill="#4a2508"/>
  <!-- Window -->
